# goreleaser config — releases run from .github/workflows/release.yml on a v* tag.
# Validate locally with: go run github.com/goreleaser/goreleaser/v2@latest check
version: 2

project_name: depdog

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/depdog
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/matterpale/depdog/internal/cli.Version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# Homebrew tap — wired but deliberately disabled. To enable:
#   1. create the github.com/matterpale/homebrew-tap repository
#   2. add a TAP_GITHUB_TOKEN secret (a PAT with repo scope on the tap)
#   3. uncomment this block and pass the token in release.yml
