# goreleaser config — releases run from .github/workflows/release.yml on a v* tag.
# Validate locally with: go run github.com/goreleaser/goreleaser/v2@latest check
version: 2

project_name: depdog

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/depdog
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/matterpale/depdog/internal/cli.Version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  # The default name_template ({{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}})
  # is reconstructed by hand in action.yml to build the download URL. Keep the two
  # in lock-step: setting a custom name_template here breaks the GitHub Action.
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# Homebrew Cask — generated and pushed to github.com/matterpale/homebrew-tap on
# each v* tag (needs the TAP_GITHUB_TOKEN secret, passed through release.yml).
# Casks supersede the deprecated `brews` formulas; note they are macOS-only, so
# Linux users install from the release archives directly.
homebrew_casks:
  - repository:
      owner: matterpale
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/matterpale/depdog
    description: A Dependency Watchdog
    # depdog ships unsigned (CGO_ENABLED=0, not notarized); strip the quarantine
    # attribute on install so macOS Gatekeeper doesn't block the binary.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/depdog"]
          end
