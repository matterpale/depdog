version: 2

components:
  domain:  { path: "src/main/kotlin/com/example/domain/**",  allow: [std] }
  service: { path: "src/main/kotlin/com/example/service/**", allow: [domain, std] }
  handler: { path: "src/main/kotlin/com/example/handler/**", allow: [service, std, external] }
  tests:   { path: "src/test/kotlin/**",                     allow: [domain, service, std] } # test sources

default: deny
