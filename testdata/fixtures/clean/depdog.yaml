version: 2

components:
  main:       { path: "cmd/**",                 allow: ["*"] }
  domain:     { path: "internal/domain/**",     allow: [std] }
  handler:    { path: "internal/handler/**",    allow: [domain, std] }
  service:    { path: "internal/service/**",    allow: [domain, std] }
  repository: { path: "internal/repository/**", allow: [domain, std, external] }

default: deny
