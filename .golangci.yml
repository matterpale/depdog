# golangci-lint v2 config (CI runs golangci/golangci-lint-action@v8, which
# installs golangci-lint v2.x). `golangci-lint config verify` validates this.
#
# Linters: the v2 "standard" default set (errcheck, govet, ineffassign,
# staticcheck, unused) — unchanged from what CI already gated.
#
# Formatters gate formatting: gofmt plus goimports with the repo's import-order
# convention (std -> external -> github.com/matterpale/depdog/internal/...).
version: "2"

linters:
  # Keep the v2 "standard" default linters; restore the classic errcheck
  # exclusions (unchecked fmt.Fprint*/Close/os.Remove* on best-effort writes)
  # so the lint gate stays signal, not noise.
  exclusions:
    presets:
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/matterpale/depdog
