name: depdog
description: Enforce your depdog.yaml architecture rules in CI — check import edges across any language.
branding:
  icon: shield
  color: orange

inputs:
  version:
    description: 'depdog release to use — a tag like "v0.6.0", or "latest".'
    required: false
    default: latest
  args:
    description: 'Arguments passed to depdog (e.g. "check --all --format github").'
    required: false
    default: check
  working-directory:
    description: Directory to run depdog in.
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Install depdog
      shell: bash
      env:
        DEPDOG_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        repo="matterpale/depdog"

        # Resolve the tag. "latest" follows the releases/latest redirect (no token
        # needed for a public repo); a bare "0.6.0" is normalized to the
        # "v"-prefixed tag depdog actually publishes.
        tag="$DEPDOG_VERSION"
        if [ "$tag" = "latest" ]; then
          eff="$(curl -fsSLI -o /dev/null -w '%{url_effective}' "https://github.com/$repo/releases/latest")" || eff=""
          tag="${eff##*/tag/}"
          if [ -z "$eff" ] || [ "$tag" = "$eff" ]; then
            echo "::error::depdog action: could not resolve the latest release tag from github.com/$repo — set version: to a specific tag like v0.6.0."
            exit 1
          fi
        elif [ "${tag#v}" = "$tag" ]; then
          tag="v$tag"
        fi
        ver="${tag#v}"  # release archives name the version without the leading "v"

        # Map the runner's OS/arch to the goreleaser asset naming.
        case "$RUNNER_OS" in
          Linux)   os=linux ;;
          macOS)   os=darwin ;;
          Windows) os=windows ;;
          *) echo "::error::depdog action: unsupported RUNNER_OS '$RUNNER_OS'"; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::depdog action: unsupported RUNNER_ARCH '$RUNNER_ARCH'"; exit 1 ;;
        esac
        ext=tar.gz
        [ "$os" = windows ] && ext=zip

        asset="depdog_${ver}_${os}_${arch}.${ext}"
        url="https://github.com/$repo/releases/download/${tag}/${asset}"
        echo "depdog action: downloading $url"

        dir="$(mktemp -d)"
        if ! curl -fsSL "$url" -o "$dir/$asset"; then
          echo "::error::depdog action: could not download $url — check that release $tag publishes an asset for ${os}/${arch} (see github.com/$repo/releases)."
          exit 1
        fi
        # `tar -xf` handles both formats: gzip is auto-detected for .tar.gz, and
        # bsdtar (the tar on Windows runners) also extracts .zip — so there is no
        # dependency on `unzip` being present.
        if ! tar -xf "$dir/$asset" -C "$dir"; then
          echo "::error::depdog action: could not extract $asset."
          exit 1
        fi
        echo "$dir" >> "$GITHUB_PATH"

    - name: Run depdog
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        DEPDOG_ARGS: ${{ inputs.args }}
      # Unquoted so multiple flags word-split; passing via env avoids injecting
      # the input straight into the script.
      run: depdog $DEPDOG_ARGS
