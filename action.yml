name: Run depdog
description: Enforce your depdog.yaml architecture rules in CI — check import edges across any language.
branding:
  icon: shield
  color: orange

inputs:
  version:
    description: 'depdog release to use — a tag like "v0.6.0", or "latest".'
    required: false
    default: latest
  args:
    description: >-
      Arguments passed to depdog (e.g. "check --all --format github"). Split on
      whitespace into separate arguments, so an argument cannot itself contain a
      space, and shell glob characters (* ? [) are expanded against the
      working directory.
    required: false
    default: check
  working-directory:
    description: Directory to run depdog in.
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Install depdog
      shell: bash
      env:
        DEPDOG_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        repo="matterpale/depdog"

        # Resolve the tag. "latest" follows the releases/latest redirect (no token
        # needed for a public repo); a bare "0.6.0" is normalized to the
        # "v"-prefixed tag depdog actually publishes.
        # curl retries cover transient network errors and 5xx/429 (rate limits);
        # a genuine 4xx (e.g. no such release) is not retried, so a real error
        # still fails fast.
        retry=(--retry 3 --retry-delay 2 --retry-connrefused)

        tag="$DEPDOG_VERSION"
        pinned=true  # an explicit tag was requested; "latest" is resolved below
        if [ "$tag" = "latest" ]; then
          pinned=false
          eff="$(curl -fsSLI "${retry[@]}" -o /dev/null -w '%{url_effective}' "https://github.com/$repo/releases/latest")" || eff=""
          tag="${eff##*/tag/}"
          if [ -z "$eff" ] || [ "$tag" = "$eff" ]; then
            echo "::error::depdog action: could not resolve the latest release tag from github.com/$repo — set version: to a specific tag like v0.6.0."
            exit 1
          fi
        elif [ "${tag#v}" = "$tag" ]; then
          tag="v$tag"
        fi
        ver="${tag#v}"  # release archives name the version without the leading "v"

        # Map the runner's OS/arch to the goreleaser asset naming.
        case "$RUNNER_OS" in
          Linux)   os=linux ;;
          macOS)   os=darwin ;;
          Windows) os=windows ;;
          *) echo "::error::depdog action: unsupported RUNNER_OS '$RUNNER_OS'"; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::depdog action: unsupported RUNNER_ARCH '$RUNNER_ARCH'"; exit 1 ;;
        esac
        ext=tar.gz
        [ "$os" = windows ] && ext=zip

        # Asset name mirrors goreleaser's default archive name_template
        # ({{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}) — keep this in lock-step
        # with archives: in .goreleaser.yaml; a custom template there breaks this.
        asset="depdog_${ver}_${os}_${arch}.${ext}"
        url="https://github.com/$repo/releases/download/${tag}/${asset}"
        echo "depdog action: downloading $url"

        dir="$(mktemp -d)"
        if ! curl -fsSL "${retry[@]}" "$url" -o "$dir/$asset"; then
          echo "::error::depdog action: could not download $url — check that release $tag publishes an asset for ${os}/${arch} (see github.com/$repo/releases)."
          exit 1
        fi

        # Verify the download against the release checksums.txt (goreleaser
        # publishes one per release). This guards against a corrupted, truncated,
        # or wrong-asset download — not a determined attacker, since the asset and
        # checksums.txt share one origin with no signature (real provenance would
        # need signed checksums or build attestation). A mismatch or a missing
        # entry is always fatal. An unreachable checksums.txt is fatal for a
        # pinned version (a published release always ships one, so its absence is
        # suspicious) but only warns for "latest", where reproducibility is already
        # not promised and a transient sidecar hiccup shouldn't block.
        if curl -fsSL "${retry[@]}" "https://github.com/$repo/releases/download/${tag}/checksums.txt" -o "$dir/checksums.txt"; then
          if command -v sha256sum >/dev/null 2>&1; then
            have="$(sha256sum "$dir/$asset" | awk '{print $1}')"
          else
            have="$(shasum -a 256 "$dir/$asset" | awk '{print $1}')"
          fi
          want="$(awk -v a="$asset" '$2 == a {print $1}' "$dir/checksums.txt")"
          if [ -z "$want" ]; then
            echo "::error::depdog action: $asset is not listed in checksums.txt for $tag."
            exit 1
          fi
          if [ "$have" != "$want" ]; then
            echo "::error::depdog action: checksum mismatch for $asset (want $want, got $have) — refusing to run a corrupted or wrong download."
            exit 1
          fi
        elif [ "$pinned" = true ]; then
          echo "::error::depdog action: could not fetch checksums.txt for $tag — refusing to run an unverified pinned download. Retry, or confirm the release publishes checksums.txt."
          exit 1
        else
          echo "::warning::depdog action: could not fetch checksums.txt for $tag; skipping integrity verification (version: latest)."
        fi

        # Extract into $dir. Linux/macOS ship .tar.gz (GNU tar auto-detects the
        # gzip). Windows ships .zip, and Git Bash's bundled tar is GNU tar, which
        # cannot read zip — so extract those with PowerShell's Expand-Archive
        # (always present on Windows runners); cygpath maps the MSYS temp paths to
        # the Windows paths PowerShell expects.
        if [ "$os" = windows ]; then
          win_asset="$(cygpath -w "$dir/$asset")"
          win_dir="$(cygpath -w "$dir")"
          if ! powershell -NoProfile -NonInteractive -Command "\$ErrorActionPreference='Stop'; Expand-Archive -LiteralPath '$win_asset' -DestinationPath '$win_dir' -Force"; then
            echo "::error::depdog action: could not extract $asset."
            exit 1
          fi
        elif ! tar -xf "$dir/$asset" -C "$dir"; then
          echo "::error::depdog action: could not extract $asset."
          exit 1
        fi

        # GITHUB_PATH needs the runner's native path form so the next step's shell
        # resolves the binary: a Windows path on Windows (Git Bash converts it back
        # and finds depdog.exe), the POSIX path elsewhere.
        if [ "$os" = windows ]; then
          cygpath -w "$dir" >> "$GITHUB_PATH"
        else
          echo "$dir" >> "$GITHUB_PATH"
        fi

    - name: Run depdog
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        DEPDOG_ARGS: ${{ inputs.args }}
      # Unquoted so multiple flags word-split; passing via env avoids injecting
      # the input straight into the script.
      run: depdog $DEPDOG_ARGS
