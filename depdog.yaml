# depdog's own architecture, checked by depdog itself in CI (dogfood).
version: 1

components:
  main:   ["cmd/**"]
  core:   ["internal/core/**"]
  config: ["internal/config/**"]
  lang:   ["internal/lang/**"]
  golang: ["internal/lang/golang/**"] # carve-out: deeper pattern wins over lang
  report: ["internal/report/**"]
  wizard: ["internal/wizard/**"]
  tui:    ["internal/tui/**"]
  cli:    ["internal/cli/**"]
  e2e:    ["internal/e2e/**"]

policy: deny

rules:
  main:   { allow: ["*"] }
  core:   { allow: [std] } # the domain layer: standard library only
  config: { allow: [core, std, external] }
  lang:   { allow: [core, std] }
  golang: { allow: [core, lang, std, external] }
  report: { allow: [core, std, external] } # lipgloss styles the human output
  wizard: { allow: [core, std] } # pure heuristics: engine matcher + std only
  tui:    { allow: [core, std, external] } # bubbletea view over a core.Result
  cli:    { allow: [core, config, lang, golang, report, wizard, tui, std, external] }
  e2e:    { allow: [std] }

options:
  test_files: hybrid
