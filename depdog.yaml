# depdog's own architecture, checked by depdog itself in CI (dogfood).
version: 2

components:
  main:   { path: "cmd/**",                  allow: ["*"] }
  core:   { path: "internal/core/**",        allow: [std] } # the domain layer: standard library only
  config: { path: "internal/config/**",      allow: [core, std, external] }
  lang:   { path: "internal/lang/**",        allow: [core, std] }
  golang: { path: "internal/lang/golang/**", allow: [core, lang, std, external] } # carve-out: deeper pattern wins over lang
  typescript: { path: "internal/lang/typescript/**", allow: [core, lang, std] } # pure scanner: stdlib only
  python: { path: "internal/lang/python/**", allow: [core, lang, std] } # pure scanner: stdlib only
  ruby:   { path: "internal/lang/ruby/**",   allow: [core, lang, std] } # pure scanner: stdlib only
  rust:   { path: "internal/lang/rust/**",   allow: [core, lang, std] } # pure scanner: stdlib only
  java:   { path: "internal/lang/java/**",   allow: [core, lang, std] } # pure scanner: stdlib only
  kotlin: { path: "internal/lang/kotlin/**", allow: [core, lang, std] } # pure scanner: stdlib only
  scala:  { path: "internal/lang/scala/**",  allow: [core, lang, std] } # pure scanner: stdlib only
  elm:    { path: "internal/lang/elm/**",    allow: [core, lang, std] } # pure scanner: stdlib only
  spec:   { path: "internal/lang/spec/**",   allow: [core, lang, std, external] } # declarative-adapter engine: YAML specs (external) -> core graph; not itself an adapter
  parity: { path: "internal/lang/spec/parity/**", allow: [core, ruby, spec, std] } # M4 trust-gate test only: imports BOTH the spec engine and the ruby adapter to prove byte-parity; a deeper pattern than `spec`, so it wins
  report: { path: "internal/report/**",      allow: [core, std, external] } # lipgloss styles the human output
  wizard: { path: "internal/wizard/**",      allow: [core, std] } # pure heuristics: engine matcher + std only
  lsp:    { path: "internal/lsp/**",         allow: [core, std] } # hand-rolled JSON-RPC: stdlib only, like core
  mcp:    { path: "internal/mcp/**",         allow: [core, std] } # hand-rolled JSON-RPC: stdlib only, like lsp
  tui:    { path: "internal/tui/**",         allow: [core, std, external] } # bubbletea view over core
  cli:    { path: "internal/cli/**",         allow: [core, config, lang, golang, typescript, python, ruby, rust, java, kotlin, scala, elm, spec, report, wizard, lsp, mcp, tui, std, external] }
  e2e:    { path: "internal/e2e/**",         allow: [std] }

default: deny

boundaries:
  # Language adapters are mutually isolated peers: no adapter may ever import
  # another, even if a future allow-list edit would otherwise permit it.
  # Not sealed: cli legitimately imports every adapter to register it.
  adapters: [golang, typescript, python, ruby, rust, java, kotlin, scala, elm]

options:
  test_files: hybrid
