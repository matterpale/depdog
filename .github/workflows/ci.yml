name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the build/test/lint jobs only read the checkout.
permissions:
  contents: read

# Cancel superseded runs on the same ref (a new push to a PR supersedes the old).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: depdog self-check
        if: runner.os == 'Linux'
        run: go run ./cmd/depdog check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          # Pin the linter version so CI matches the v2-schema .golangci.yml (and
          # the local toolchain) rather than drifting with the action's default.
          version: v2.1.6
