name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the build/test/lint jobs only read the checkout.
permissions:
  contents: read

# Cancel superseded runs on the same ref (a new push to a PR supersedes the old).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: depdog self-check
        if: runner.os == 'Linux'
        run: go run ./cmd/depdog check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          # Match the local toolchain (v2.1.6) exactly. install-mode: goinstall
          # builds golangci-lint from source with the runner's Go (1.26.2, via
          # setup-go from go.mod) instead of downloading the prebuilt release
          # binary — the prebuilt v2.1.6 was built with Go 1.24 and refuses to lint
          # a module targeting a newer Go ("the Go language version used to build
          # golangci-lint is lower than the targeted Go version"). Building it here
          # keeps CI identical to `golangci-lint run` locally.
          version: v2.1.6
          install-mode: goinstall
